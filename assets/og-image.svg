<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#f4f7f5"/>
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg-grad)"/>
    <!-- Decorative circles -->
    <circle cx="1050" cy="100" r="180" fill="#059669" opacity="0.15"/>
    <circle cx="150" cy="530" r="150" fill="#f59e0b" opacity="0.15"/>
    <!-- Main title -->
    <text x="600" y="260" text-anchor="middle" font-family="'Roboto Slab', serif" font-weight="700" font-size="96" fill="#0f172a">Waloo</text>
    <!-- Arabic subtitle -->
    <text x="600" y="360" text-anchor="middle" font-family="'Cairo', sans-serif" font-size="40" fill="#334155" direction="rtl">عروض محلية في الجزائر</text>
    <!-- English tagline -->
    <text x="600" y="430" text-anchor="middle" font-family="'Roboto Slab', serif" font-size="24" fill="#64748b">Save money. Reduce waste.</text>
</svg>
